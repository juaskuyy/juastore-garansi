<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cek Status</title><link rel="stylesheet" href="style.css"></head><body><header><div class="wrap brand"><div class="logo">JS</div><div><h2 style="margin:0">Cek Status Garansi</h2></div><nav class="nav"><a href="index.html">Ajukan</a><a href="cek.html">Cek Status</a></nav></div></header><main class="wrap"><section class="card hero"><h2>🔎 Cek Status</h2><p>Masukkan ID garansi customer.</p></section><section class="card"><form id="f" class="toolbar"><div class="grow"><label>ID Garansi</label><input id="id" placeholder="GRN-260723-3989" required></div><button>Cek</button></form><div id="r" class="status"></div></section></main><script>const API="https://garansi.jhonyoga01.workers.dev",r=document.getElementById("r");document.getElementById("f").onsubmit=async e=>{e.preventDefault();r.className="status show info";r.textContent="Mengecek...";try{const id=document.getElementById("id").value.trim(),x=await fetch(API+"/api/status/"+encodeURIComponent(id)),j=await x.json();if(!x.ok||!j.success)throw Error(j.message);const d=j.data;r.className="status show success";r.innerHTML=`<h3>${d.id}</h3><p><b>Produk:</b> ${d.product}</p><p><b>Jenis:</b> ${d.claim_type}</p><p><b>Status:</b> ${d.status}</p><p><b>Keterangan:</b><br>${d.admin_note||"Belum ada keterangan."}</p>`}catch(e){r.className="status show error";r.textContent=e.message}};</script></body></html>

<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Garansi JuaStore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="wrap">
  <nav class="nav">
    <a href="index.html">Form Garansi</a>
    <a href="cek.html">Cek Status</a>
    <a href="admin.html">Admin</a>
  </nav>

  <section id="loginCard" class="card">
    <h1>Login Admin</h1>
    <form id="loginForm" class="grid two">
      <input id="adminKeyInput" type="password" placeholder="Masukkan ADMIN_KEY" required>
      <button type="submit">Masuk</button>
    </form>
    <div id="loginMessage" class="message"></div>
  </section>

  <section id="dashboard" class="hidden">
    <div class="card">
      <div class="grid two">
        <div>
          <h1>Dashboard Garansi</h1>
          <p class="muted">Kelola seluruh pengajuan pelanggan.</p>
        </div>
        <button id="logoutBtn" class="secondary">Keluar</button>
      </div>

      <div id="stats" class="stats"></div>

      <div class="grid two">
        <input id="searchInput" placeholder="Cari ID, nama, WA, produk...">
        <select id="statusFilter">
          <option value="">Semua status</option>
          <option>Menunggu</option>
          <option>Diproses</option>
          <option>Selesai</option>
          <option>Ditolak</option>
        </select>
      </div>

      <div style="margin:12px 0" class="grid two">
        <button id="refreshBtn">Muat Ulang</button>
        <button id="exportBtn" class="secondary">Export CSV</button>
      </div>

      <div id="adminMessage" class="message"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Pelanggan</th><th>Produk</th><th>Kendala</th>
              <th>Status</th><th>Tanggal</th><th>Aksi</th>
            </tr>
          </thead>
          <tbody id="claimsBody"></tbody>
        </table>
      </div>
    </div>
  </section>
</main>

<script>
const API = "https://garansi.jhonyoga01.workers.dev";
let adminKey = sessionStorage.getItem("juastore_admin_key") || "";
let claims = [];

const loginCard = document.getElementById("loginCard");
const dashboard = document.getElementById("dashboard");
const loginMessage = document.getElementById("loginMessage");
const adminMessage = document.getElementById("adminMessage");

document.getElementById("loginForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  adminKey = document.getElementById("adminKeyInput").value.trim();
  try {
    await api("/api/admin/stats");
    sessionStorage.setItem("juastore_admin_key", adminKey);
    showDashboard();
  } catch (error) {
    loginMessage.textContent = error.message;
    loginMessage.className = "message bad";
  }
});

document.getElementById("logoutBtn").onclick = () => {
  sessionStorage.removeItem("juastore_admin_key");
  location.reload();
};

document.getElementById("refreshBtn").onclick = loadAll;
document.getElementById("exportBtn").onclick = exportCsv;
document.getElementById("searchInput").addEventListener("input", debounce(loadClaims, 300));
document.getElementById("statusFilter").addEventListener("change", loadClaims);

async function api(path, options = {}) {
  const response = await fetch(API + path, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${adminKey}`,
      ...(options.headers || {})
    }
  });

  const result = await response.json().catch(() => ({
    success: false,
    message: `Respons server tidak valid (${response.status}).`
  }));

  if (!response.ok || !result.success) {
    throw new Error(result.message || "Permintaan gagal.");
  }

  return result;
}

async function showDashboard() {
  loginCard.classList.add("hidden");
  dashboard.classList.remove("hidden");
  await loadAll();
}

async function loadAll() {
  adminMessage.className = "message";
  try {
    await Promise.all([loadStats(), loadClaims()]);
  } catch (error) {
    adminMessage.textContent = error.message;
    adminMessage.className = "message bad";
  }
}

async function loadStats() {
  const { data } = await api("/api/admin/stats");
  const items = [
    ["Total", data.total], ["Hari ini", data.hari_ini],
    ["Menunggu", data.menunggu], ["Diproses", data.diproses],
    ["Selesai", data.selesai], ["Ditolak", data.ditolak]
  ];
  document.getElementById("stats").innerHTML = items
    .map(([label, value]) => `<div class="stat"><span>${label}</span><b>${value}</b></div>`)
    .join("");
}

async function loadClaims() {
  const q = document.getElementById("searchInput").value.trim();
  const status = document.getElementById("statusFilter").value;
  const params = new URLSearchParams();
  if (q) params.set("q", q);
  if (status) params.set("status", status);

  const { data } = await api(`/api/admin/claims?${params}`);
  claims = data;
  renderClaims();
}

function renderClaims() {
  const body = document.getElementById("claimsBody");
  if (!claims.length) {
    body.innerHTML = `<tr><td colspan="7">Belum ada data.</td></tr>`;
    return;
  }

  body.innerHTML = claims.map(item => `
    <tr>
      <td><b>${escapeHtml(item.id)}</b><br><small>${escapeHtml(item.order_id || "-")}</small></td>
      <td>${escapeHtml(item.name)}<br>
        <a href="https://wa.me/${escapeHtml(item.whatsapp)}" target="_blank">${escapeHtml(item.whatsapp)}</a><br>
        <small>${escapeHtml(item.account || "-")}</small>
      </td>
      <td>${escapeHtml(item.product)}<br><small>${escapeHtml(item.claim_type || "-")}</small></td>
      <td>${escapeHtml(item.problem)}</td>
      <td><span class="badge">${escapeHtml(item.status)}</span><br><small>${escapeHtml(item.admin_note || "-")}</small></td>
      <td>${new Date(item.created_at).toLocaleString("id-ID")}</td>
      <td>
        <div class="actions">
          <button onclick="editClaim('${item.id}')">Ubah</button>
          <button class="secondary" onclick="removeClaim('${item.id}')">Hapus</button>
        </div>
      </td>
    </tr>
  `).join("");
}

async function editClaim(id) {
  const item = claims.find(v => v.id === id);
  if (!item) return;

  const status = prompt("Status: Menunggu / Diproses / Selesai / Ditolak", item.status);
  if (status === null) return;

  const adminNote = prompt("Catatan admin", item.admin_note || "");
  if (adminNote === null) return;

  try {
    await api(`/api/admin/claims/${encodeURIComponent(id)}`, {
      method: "PATCH",
      body: JSON.stringify({ status, adminNote })
    });
    await loadAll();
  } catch (error) {
    alert(error.message);
  }
}

async function removeClaim(id) {
  if (!confirm(`Hapus data ${id}?`)) return;
  try {
    await api(`/api/admin/claims/${encodeURIComponent(id)}`, { method: "DELETE" });
    await loadAll();
  } catch (error) {
    alert(error.message);
  }
}

function exportCsv() {
  if (!claims.length) return alert("Tidak ada data.");

  const headers = [
    "ID","Nama","WhatsApp","Produk","Akun","ID Order","Tanggal Order",
    "Durasi","Jenis","Kendala","Status","Catatan Admin","Dibuat","Diperbarui"
  ];

  const rows = claims.map(v => [
    v.id,v.name,v.whatsapp,v.product,v.account,v.order_id,v.order_date,
    v.duration,v.claim_type,v.problem,v.status,v.admin_note,v.created_at,v.updated_at
  ]);

  const csv = [headers, ...rows]
    .map(row => row.map(value => `"${String(value ?? "").replaceAll('"','""')}"`).join(","))
    .join("\n");

  const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `juastore-garansi-${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
  URL.revokeObjectURL(link.href);
}

function debounce(fn, wait) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), wait);
  };
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  })[c]);
}

if (adminKey) showDashboard();
</script>
</body>
</html>

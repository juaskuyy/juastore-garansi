<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Dashboard Admin</title><link rel="stylesheet" href="style.css"></head><body><header><div class="wrap brand"><div class="logo">JS</div><div><h2 style="margin:0">Dashboard Garansi</h2><span class="muted">Admin JuaStore</span></div><nav class="nav"><a href="index.html">Website</a><a href="cek.html">Cek Status</a></nav></div></header><main class="wrap"><section id="loginBox" class="card"><h2>🔐 Login Admin</h2><form id="login" class="toolbar"><div class="grow"><label>ADMIN_KEY</label><input id="key" type="password" required></div><button>Masuk</button></form><div id="lm" class="status"></div></section><div id="dash" style="display:none"><section class="stats"><div class="stat">Total<strong id="total">0</strong></div><div class="stat">Hari ini<strong id="today">0</strong></div><div class="stat">Menunggu<strong id="wait">0</strong></div><div class="stat">Diproses<strong id="process">0</strong></div><div class="stat">Selesai<strong id="done">0</strong></div></section><section class="card"><div class="toolbar"><div class="grow"><label>Cari</label><input id="q" placeholder="ID, nama, WA, produk"></div><div><label>Status</label><select id="filter"><option value="">Semua</option><option>Menunggu</option><option>Diproses</option><option>Selesai</option><option>Ditolak</option></select></div><button id="reload">Muat ulang</button><button id="csv" class="secondary">Export CSV</button></div></section><section class="card"><div class="tablewrap"><table><thead><tr><th>ID</th><th>Customer</th><th>Produk/Kendala</th><th>Status & Catatan</th><th>Aksi</th></tr></thead><tbody id="rows"></tbody></table></div></section></div></main><script>const API="https://garansi.jhonyoga01.workers.dev",$=x=>document.getElementById(x);let key=sessionStorage.getItem("jskey")||"",data=[];if(key)open();$("login").onsubmit=e=>{e.preventDefault();key=$("key").value.trim();sessionStorage.setItem("jskey",key);open()};$("reload").onclick=load;$("filter").onchange=load;$("q").oninput=deb(load,300);$("csv").onclick=csv;async function api(p,o={}){o.headers={...(o.headers||{}),Authorization:"Bearer "+key};const r=await fetch(API+p,o),j=await r.json();if(!r.ok||!j.success)throw Error(j.message);return j}async function open(){try{await stats();$("loginBox").style.display="none";$("dash").style.display="block";load()}catch(e){sessionStorage.removeItem("jskey");$("lm").className="status show error";$("lm").textContent=e.message}}async function stats(){const s=(await api("/api/admin/stats")).data;$("total").textContent=s.total||0;$("today").textContent=s.hari_ini||0;$("wait").textContent=s.menunggu||0;$("process").textContent=s.diproses||0;$("done").textContent=s.selesai||0}async function load(){data=(await api(`/api/admin/claims?q=${encodeURIComponent($("q").value)}&status=${encodeURIComponent($("filter").value)}`)).data;render();stats()}function render(){$("rows").innerHTML=data.map(c=>`<tr><td><b>${e(c.id)}</b><br>${new Date(c.created_at).toLocaleString("id-ID")}</td><td><b>${e(c.name)}</b><br>${e(c.whatsapp)}<br><a href="https://wa.me/${e(c.whatsapp)}" target="_blank">Balas WA</a></td><td><b>${e(c.product)}</b><br>${e(c.problem)}</td><td><select id="s-${c.id}"><option ${c.status==="Menunggu"?"selected":""}>Menunggu</option><option ${c.status==="Diproses"?"selected":""}>Diproses</option><option ${c.status==="Selesai"?"selected":""}>Selesai</option><option ${c.status==="Ditolak"?"selected":""}>Ditolak</option></select><textarea id="n-${c.id}" placeholder="Keterangan admin">${e(c.admin_note||"")}</textarea></td><td><button onclick="save('${c.id}')">Simpan</button><br><br><button class="danger" onclick="removeC('${c.id}')">Hapus</button></td></tr>`).join("")}async function save(id){await api("/api/admin/claims/"+encodeURIComponent(id),{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:$("s-"+id).value,adminNote:$("n-"+id).value})});alert("Tersimpan");load()}async function removeC(id){if(confirm("Hapus "+id+"?")){await api("/api/admin/claims/"+encodeURIComponent(id),{method:"DELETE"});load()}}function csv(){const h=["ID","Nama","WA","Produk","Status","Catatan","Dibuat"],rows=data.map(c=>[c.id,c.name,c.whatsapp,c.product,c.status,c.admin_note,c.created_at]),s=[h,...rows].map(r=>r.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\n"),a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\ufeff"+s],{type:"text/csv"}));a.download="garansi-juastore.csv";a.click()}function e(v){return String(v||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c])}function deb(f,t){let x;return()=>{clearTimeout(x);x=setTimeout(f,t)}};</script></body></html>

<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Garansi JuaStore</title><link rel="stylesheet" href="style.css"></head><body><header><div class="wrap brand"><div class="logo">JS</div><div><h2 style="margin:0">Garansi JuaStore</h2><span class="muted">Apps • Games • Hosting</span></div><nav class="nav"><a href="index.html">Ajukan</a><a href="cek.html">Cek Status</a></nav></div></header><main class="wrap"><section class="card hero"><h2>🛡️ Form Garansi</h2><p>Pengajuan masuk ke Telegram dan tersimpan di dashboard admin.</p></section><section class="card"><form id="f"><div class="grid"><div><label>Nama *</label><input id="name" required></div><div><label>WhatsApp *</label><input id="whatsapp" placeholder="6285111662004" required></div><div><label>Produk *</label><input id="product" required></div><div><label>Email/Akun</label><input id="account"></div><div><label>ID Order</label><input id="orderId"></div><div><label>Tanggal Order</label><input id="orderDate" type="date"></div><div><label>Durasi</label><input id="duration"></div><div><label>Jenis</label><select id="claimType"><option>Garansi</option><option>Refund</option></select></div><div class="full"><label>Kendala *</label><textarea id="problem" required></textarea></div><div class="full"><label>Screenshot *</label><input id="evidence" type="file" accept="image/jpeg,image/png,image/webp" required></div></div><br><button id="send">✈️ Kirim Pengajuan</button><div id="msg" class="status"></div></form></section></main><script>const API="https://garansi.jhonyoga01.workers.dev",$=x=>document.getElementById(x),m=$("msg");$("f").onsubmit=async e=>{e.preventDefault();const file=$("evidence").files[0];if(!file)return show("Screenshot wajib dipilih.","error");if(file.size>5*1024*1024)return show("Screenshot maksimal 5 MB.","error");$("send").disabled=true;show("Mengirim...","info");try{const evidenceDataUrl=await data(file),payload={name:v("name"),whatsapp:v("whatsapp"),product:v("product"),account:v("account"),orderId:v("orderId"),orderDate:v("orderDate"),duration:v("duration"),claimType:v("claimType"),problem:v("problem"),evidenceDataUrl},r=await fetch(API+"/api/claims",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}),j=await r.json();if(!r.ok||!j.success)throw Error(j.message);m.className="status show success";m.innerHTML=`✅ Berhasil.<br><br>ID Garansi: <b>${j.warrantyId}</b><br>Simpan ID untuk cek status.`;$("f").reset()}catch(err){show(err.message||"Gagal mengirim.","error")}finally{$("send").disabled=false}};function v(i){return $(i).value.trim()}function show(t,c){m.className="status show "+c;m.textContent=t}function data(f){return new Promise((a,b)=>{const r=new FileReader;r.onload=()=>a(r.result);r.onerror=()=>b(Error("File gagal dibaca."));r.readAsDataURL(f)})}</script></body></html>

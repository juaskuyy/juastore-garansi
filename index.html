<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Form Garansi JuaStore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">
    <nav class="nav">
      <a href="index.html">Form Garansi</a>
      <a href="cek.html">Cek Status</a>
      <a href="admin.html">Admin</a>
    </nav>

    <section class="card">
      <h1>Form Garansi JuaStore</h1>
      <p class="muted">Isi data dengan benar. Simpan ID garansi setelah pengajuan berhasil.</p>

      <form id="claimForm" class="grid">
        <div class="grid two">
          <div><label>Nama *</label><input name="name" required></div>
          <div><label>Nomor WhatsApp *</label><input name="whatsapp" placeholder="08xxxxxxxxxx" required></div>
        </div>

        <div class="grid two">
          <div><label>Produk *</label><input name="product" required></div>
          <div><label>Email/Akun</label><input name="account"></div>
        </div>

        <div class="grid two">
          <div><label>ID Order</label><input name="orderId"></div>
          <div><label>Tanggal Order</label><input type="date" name="orderDate"></div>
        </div>

        <div class="grid two">
          <div><label>Durasi</label><input name="duration" placeholder="Contoh: 1 bulan"></div>
          <div>
            <label>Jenis Pengajuan</label>
            <select name="claimType">
              <option>Garansi</option>
              <option>Kendala Login</option>
              <option>Akun Bermasalah</option>
              <option>Lainnya</option>
            </select>
          </div>
        </div>

        <div><label>Kendala *</label><textarea name="problem" required></textarea></div>
        <div><label>Screenshot bukti</label><input id="evidence" type="file" accept="image/jpeg,image/png,image/webp"></div>
        <button id="submitBtn" type="submit">Kirim Pengajuan</button>
      </form>

      <div id="message" class="message"></div>
    </section>
  </main>

<script>
const API = "https://garansi.jhonyoga01.workers.dev";

const form = document.getElementById("claimForm");
const message = document.getElementById("message");
const submitBtn = document.getElementById("submitBtn");

function showMessage(text, ok) {
  message.textContent = text;
  message.className = "message " + (ok ? "ok" : "bad");
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    if (!file) return resolve("");
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("Screenshot gagal dibaca."));
    reader.readAsDataURL(file);
  });
}

form.addEventListener("submit", async (event) => {
  event.preventDefault();
  submitBtn.disabled = true;
  submitBtn.textContent = "Mengirim...";
  message.className = "message";

  try {
    const data = Object.fromEntries(new FormData(form).entries());
    delete data.evidence;

    const file = document.getElementById("evidence").files[0];
    if (file && file.size > 5 * 1024 * 1024) {
      throw new Error("Screenshot maksimal 5 MB.");
    }

    data.evidenceDataUrl = await fileToDataUrl(file);

    const response = await fetch(`${API}/api/claims`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await response.json().catch(() => ({
      success: false,
      message: `Respons server tidak valid (${response.status}).`
    }));

    if (!response.ok || !result.success) {
      throw new Error(result.message || "Pengajuan gagal.");
    }

    showMessage(
      `${result.message} ID Garansi: ${result.warrantyId}` +
      (result.warning ? ` Catatan: ${result.warning}` : ""),
      true
    );
    form.reset();
  } catch (error) {
    showMessage(error.message || "Failed to fetch.", false);
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Kirim Pengajuan";
  }
});
</script>
</body>
</html>
